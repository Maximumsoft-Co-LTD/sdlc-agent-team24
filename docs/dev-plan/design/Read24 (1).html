  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

     <!-- grid -->\n        <sc-if value=\"{{ hasResults }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(216px,1fr));gap:26px 22px;\">\n            <sc-for list=\"{{ books }}\" as=\"book\" hint-placeholder-count=\"8\">\n              <div style=\"animation:r24in .4s ease;\">\n                <button onclick=\"{{ book.onOpen }}\" style=\"position:relative;display:block;width:100%;aspect-ratio:2/3;border:none;padding:0;cursor:pointer;background:none;border-radius:6px;box-shadow:0 2px 4px rgba(42,36,28,.10),0 14px 26px -16px rgba(42,36,28,.4);overflow:hidden;\">\n                  {{ book.coverEl }}\n                  <span onclick=\"{{ book.onAdd }}\" title=\"เพิ่มลงตะกร้า\" style=\"position:absolute;bottom:10px;right:10px;width:38px;height:38px;border-radius:10px;background:rgba(42,36,28,.92);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.3);\">\n                    <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FBF6EC\" stroke-width=\"2.2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"padding-top:13px;\">\n                  <div style=\"font-family:'Trirong',serif;font-size:18px;font-weight:600;line-height:1.2;letter-spacing:-.01em;color:#2A241C;\">{{ book.title }}<\u002Fdiv>\n                  <div style=\"font-size:13.5px;color:#8a7f68;margin-top:2px;\">{{ book.author }}<\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap;\">\n                    <span style=\"font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:16px;color:#2A241C;white-space:nowrap;\">฿{{ book.buyPrice }} <span style=\"font-weight:400;font-size:11.5px;color:#b6ac93;\">ซื้อขาด<\u002Fspan><\u002Fspan>\n                    <span style=\"margin-left:auto;display:inline-flex;align-items:center;gap:5px;background:#F7E4D5;color:#BF5A2B;border:1px solid #EAC9B3;border-radius:30px;padding:4px 10px;font-size:12.5px;font-weight:600;white-space:nowrap;\">เช่า ฿{{ book.rentPrice }} · {{ book.rentDays }} วัน<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:80px 20px;color:#8a7f68;\">\n            <div style=\"font-family:'Trirong',serif;font-size:26px;color:#2A241C;margin-bottom:8px;\">ไม่พบหนังสือที่ค้นหา<\u002Fdiv>\n            <div style=\"font-size:15px;\">ลองค้นด้วยคำอื่น หรือเลือกจากหมวดหมู่ด้านบน<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== DETAIL ===================== -->\n    <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:1100px;margin:0 auto;padding:22px;animation:r24in .4s ease;\">\n        <button onclick=\"{{ goStore }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:none;border:none;color:#6B6253;font-size:14px;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif;margin-bottom:18px;padding:6px 0;\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>กลับไปร้านหนังสือ\n        <\u002Fbutton>\n        <div style=\"display:grid;grid-template-columns:330px 1fr;gap:46px;align-items:start;\">\n          <!-- left cover -->\n          <div style=\"position:sticky;top:120px;\">\n            <div style=\"aspect-ratio:2/3;border-radius:8px;overflow:hidden;box-shadow:0 6px 14px rgba(42,36,28,.16),0 30px 50px -20px rgba(42,36,28,.5);\">{{ sel.coverEl }}<\u002Fdiv>\n            <div style=\"display:flex;gap:14px;justify-content:center;margin-top:18px;color:#8a7f68;font-size:13px;\">\n              <span>📖 {{ sel.pages }} หน้า<\u002Fspan><span>·<\u002Fspan><span>EPUB<\u002Fspan><span>·<\u002Fspan><span>ไทย<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- right info -->\n          <div>\n            <div style=\"font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#BF5A2B;font-weight:600;\">{{ sel.category }}<\u002Fdiv>\n            <h1 style=\"font-family:'Trirong',serif;font-size:40px;line-height:1.1;font-weight:600;margin:8px 0 6px;letter-spacing:-.01em;\">{{ sel.title }}<\u002Fh1>\n            <div style=\"font-size:16px;color:#6B6253;margin-bottom:20px;\">โดย {{ sel.author }}<\u002Fdiv>\n            <p style=\"font-size:15.5px;line-height:1.75;color:#4a4234;margin:0 0 26px;max-width:560px;\">เรื่องราวที่พาคุณดำดิ่งสู่ห้วงความรู้สึกอันละเอียดอ่อน ผ่านสำนวนที่งดงามและตัวละครที่มีชีวิต หนังสือเล่มนี้เหมาะกับค่ำคืนที่คุณอยากใช้เวลากับตัวเองสักหน่อย — ลองเช่าอ่านก่อน แล้วค่อยตัดสินใจเป็นเจ้าของก็ได้<\u002Fp>\n\n            <!-- BUY vs RENT -->\n            <div style=\"font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:14px;color:#2A241C;margin-bottom:12px;\">เลือกวิธีอ่าน<\u002Fdiv>\n            <div style=\"display:flex;gap:14px;margin-bottom:24px;\">\n              <button onclick=\"{{ setBuy }}\" style=\"{{ buyCardStyle }}\">\n                <sc-if value=\"{{ modeBuy }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;background:#BF5A2B;display:flex;align-items:center;justify-content:center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fsc-if>\n                <div style=\"font-size:13px;color:#C99A3F;font-weight:600;margin-bottom:6px;\">ซื้อขาด<\u002Fdiv>\n                <div style=\"font-family:'Trirong',serif;font-size:30px;font-weight:700;color:#FBF6EC;line-height:1;\">฿{{ sel.buyPrice }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#b9ad95;margin-top:8px;\">เป็นเจ้าของถาวร · อ่านได้ตลอดไป<\u002Fdiv>\n              <\u002Fbutton>\n              <button onclick=\"{{ setRent }}\" style=\"{{ rentCardStyle }}\">\n                <sc-if value=\"{{ modeRent }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;background:#BF5A2B;display:flex;align-items:center;justify-content:center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fsc-if>\n                <div style=\"display:inline-block;font-size:11px;background:#BF5A2B;color:#fff;padding:2px 8px;border-radius:20px;font-weight:600;margin-bottom:6px;\">ประหยัดกว่า<\u002Fdiv>\n                <div style=\"font-family:'Trirong',serif;font-size:30px;font-weight:700;color:#BF5A2B;line-height:1;\">฿{{ sel.rentPrice }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#9a7a5a;margin-top:8px;\">เช่า {{ sel.rentDays }} วัน · เริ่มอ่านทันที<\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fdiv>\n\n            <!-- pay method -->\n            <div style=\"font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:14px;color:#2A241C;margin-bottom:12px;\">วิธีชำระเงิน<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px;max-width:420px;margin-bottom:24px;\">\n              <sc-for list=\"{{ payMethods }}\" as=\"pay\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ pay.onClick }}\" style=\"{{ pay.style }}\">\n                  <span style=\"width:34px;height:34px;border-radius:9px;background:#FBEFD6;color:#7a5a16;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:16px;\">{{ pay.icon }}<\u002Fspan>\n                  <span style=\"display:flex;flex-direction:column;\"><span style=\"font-weight:600;color:#2A241C;\">{{ pay.label }}<\u002Fspan><span style=\"font-size:12.5px;color:#8a7f68;\">{{ pay.sub }}<\u002Fspan><\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap;\">\n              <button onclick=\"{{ doConfirm }}\" style=\"background:#BF5A2B;color:#FBF6EC;border:none;border-radius:12px;padding:16px 30px;font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 8px 18px -8px rgba(191,90,43,.7);\">{{ confirmLabel }}<\u002Fbutton>\n              <button onclick=\"{{ addSel }}\" style=\"background:#fff;color:#2A241C;border:1.5px solid #DDD1B8;border-radius:12px;padding:16px 22px;font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:15px;cursor:pointer;\">เพิ่มลงตะกร้า<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"margin-top:18px;display:flex;align-items:center;gap:9px;background:#F3F0E6;border-radius:11px;padding:13px 16px;font-size:13.5px;color:#5a5142;max-width:520px;\">\n              <span style=\"font-size:16px;\">↻<\u002Fspan> <b style=\"color:#2F5D50;\">เช่าแล้วชอบ?<\u002Fb> อัปเกรดเป็นซื้อขาดเมื่อไหร่ก็ได้ เราหักค่าเช่าที่จ่ายไปแล้วให้\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- related -->\n        <div style=\"margin-top:54px;border-top:1px solid #DDD1B8;padding-top:30px;\">\n          <h2 style=\"font-family:'Trirong',serif;font-size:24px;font-weight:600;margin:0 0 20px;\">เล่มอื่นที่น่าสนใจ<\u002Fh2>\n          <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:18px;\">\n            <sc-for list=\"{{ related }}\" as=\"rb\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ rb.onOpen }}\" style=\"background:none;border:none;padding:0;cursor:pointer;text-align:left;\">\n                <div style=\"aspect-ratio:2/3;border-radius:6px;overflow:hidden;box-shadow:0 2px 4px rgba(42,36,28,.1),0 12px 22px -14px rgba(42,36,28,.4);\">{{ rb.coverEl }}<\u002Fdiv>\n                <div style=\"font-family:'Trirong',serif;font-size:15px;font-weight:600;margin-top:9px;line-height:1.2;\">{{ rb.title }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#BF5A2B;font-weight:600;margin-top:3px;\">เช่า ฿{{ rb.rentPrice }}<\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== CART ===================== -->\n    <sc-if value=\"{{ isCart }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:980px;margin:0 auto;padding:22px;animation:r24in .4s ease;\">\n        <h1 style=\"font-family:'Trirong',serif;font-size:34px;font-weight:600;margin:6px 0 24px;\">ตะกร้าของฉัน<\u002Fh1>\n        <sc-if value=\"{{ checkoutDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px solid #E0D5BE;border-radius:18px;padding:50px;text-align:center;\">\n            <div style=\"width:62px;height:62px;border-radius:50%;background:#E6F0E8;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3B7A57\" stroke-width=\"2.4\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <h2 style=\"font-family:'Trirong',serif;font-size:27px;font-weight:600;margin:0 0 8px;\">ชำระเงินสำเร็จ!<\u002Fh2>\n            <p style=\"color:#6B6253;margin:0 0 24px;\">หนังสือทั้งหมดถูกเพิ่มเข้าชั้นหนังสือของคุณแล้ว เปิดอ่านได้ทันที<\u002Fp>\n            <div style=\"display:flex;gap:12px;justify-content:center;\">\n              <button onclick=\"{{ goShelf }}\" style=\"background:#2A241C;color:#FBF6EC;border:none;border-radius:11px;padding:13px 24px;font-weight:600;font-size:15px;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif;\">ไปที่ชั้นหนังสือ<\u002Fbutton>\n              <button onclick=\"{{ resetCart }}\" style=\"background:#fff;color:#2A241C;border:1.5px solid #DDD1B8;border-radius:11px;padding:13px 24px;font-weight:600;font-size:15px;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif;\">เลือกซื้อต่อ<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ cartEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px solid #E0D5BE;border-radius:18px;padding:60px;text-align:center;color:#8a7f68;\">\n            <div style=\"font-family:'Trirong',serif;font-size:24px;color:#2A241C;margin-bottom:8px;\">ตะกร้ายังว่างอยู่<\u002Fdiv>\n            <p style=\"margin:0 0 22px;\">ตะกร้ารับเฉพาะรายการ “ซื้อขาด” — การเช่าทำได้ทีละเล่มในหน้ารายละเอียด<\u002Fp>\n            <button onclick=\"{{ goStore }}\" style=\"background:#BF5A2B;color:#FBF6EC;border:none;border-radius:11px;padding:13px 24px;font-weight:600;font-size:15px;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif;\">เลือกหนังสือ<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ cartList }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:grid;grid-template-columns:1fr 320px;gap:26px;align-items:start;\">\n            <div style=\"display:flex;flex-direction:column;gap:14px;\">\n              <sc-for list=\"{{ cartList }}\" as=\"ci\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;gap:16px;background:#fff;border:1px solid #E0D5BE;border-radius:14px;padding:14px;align-items:center;\">\n                  <button onclick=\"{{ ci.onOpen }}\" style=\"width:64px;flex-shrink:0;aspect-ratio:2/3;border-radius:5px;overflow:hidden;border:none;padding:0;cursor:pointer;box-shadow:0 4px 10px -4px rgba(0,0,0,.4);\">{{ ci.coverEl }}<\u002Fbutton>\n                  <div style=\"flex:1;\">\n                    <div style=\"font-family:'Trirong',serif;font-size:18px;font-weight:600;\">{{ ci.title }}<\u002Fdiv>\n                    <div style=\"font-size:13px;color:#8a7f68;margin:2px 0 6px;\">{{ ci.author }}<\u002Fdiv>\n                    <span style=\"display:inline-block;background:#EDEBE1;color:#5a5142;font-size:12px;padding:3px 10px;border-radius:20px;\">ซื้อขาด · เป็นเจ้าของถาวร<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"text-align:right;\">\n                    <div style=\"font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:18px;\">฿{{ ci.buyPrice }}<\u002Fdiv>\n                    <button onclick=\"{{ ci.onRemove }}\" style=\"background:none;border:none;color:#b09a7a;font-size:13px;cursor:pointer;margin-top:6px;font-family:'IBM Plex Sans Thai',sans-serif;\">ลบ<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E0D5BE;border-radius:16px;padding:22px;position:sticky;top:120px;\">\n              <h3 style=\"font-family:'Trirong',serif;font-size:20px;font-weight:600;margin:0 0 16px;\">สรุปคำสั่งซื้อ<\u002Fh3>\n              <div style=\"display:flex;justify-content:space-between;font-size:14.5px;color:#5a5142;margin-bottom:10px;\"><span>ยอดรวมหนังสือ<\u002Fspan><span>฿{{ cartSum }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:14.5px;color:#5a5142;margin-bottom:14px;\"><span>ค่าธรรมเนียม<\u002Fspan><span>฿0<\u002Fspan><\u002Fdiv>\n              <div style=\"border-top:1px dashed #DDD1B8;padding-top:14px;display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;\"><span style=\"font-weight:600;\">ยอดชำระ<\u002Fspan><span style=\"font-family:'Trirong',serif;font-size:26px;font-weight:700;color:#BF5A2B;\">฿{{ cartSum }}<\u002Fspan><\u002Fdiv>\n              <button onclick=\"{{ doCheckout }}\" style=\"width:100%;background:#BF5A2B;color:#FBF6EC;border:none;border-radius:12px;padding:15px;font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:16px;cursor:pointer;\">ชำระเงินทั้งหมด<\u002Fbutton>\n              <div style=\"text-align:center;font-size:12.5px;color:#9a8f78;margin-top:12px;\">จ่ายด้วยเหรียญ · บัตร · QR พร้อมเพย์<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== WALLET ===================== -->\n    <sc-if value=\"{{ isWallet }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:980px;margin:0 auto;padding:22px;animation:r24in .4s ease;\">\n        <div style=\"background:linear-gradient(120deg,#3a2f22,#2A241C);border-radius:20px;padding:32px 34px;color:#F3E9D2;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;position:relative;overflow:hidden;\">\n          <div style=\"position:relative;z-index:2;\">\n            <div style=\"font-size:13.5px;letter-spacing:.1em;text-transform:uppercase;color:#C99A3F;font-weight:600;\">กระเป๋าเหรียญ<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:10px;margin-top:8px;\"><span style=\"width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#F0CE73,#C99A3F);display:inline-flex;align-items:center;justify-content:center;color:#6b4e10;font-weight:700;font-size:17px;\">฿<\u002Fspan><span style=\"font-family:'Trirong',serif;font-size:46px;font-weight:700;line-height:1;\">{{ walletBalance }}<\u002Fspan><span style=\"color:#b9ad95;font-size:15px;\">เหรียญ<\u002Fspan><\u002Fdiv>\n            <div style=\"color:#b9ad95;font-size:13.5px;margin-top:8px;\">1 เหรียญ = 1 บาท · ใช้ซื้อหรือเช่าได้ทุกเล่ม<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:absolute;right:-40px;top:-50px;width:200px;height:200px;border-radius:50%;background:rgba(201,154,63,.14);\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2 style=\"font-family:'Trirong',serif;font-size:24px;font-weight:600;margin:30px 0 16px;\">เลือกแพ็กเกจเติมเหรียญ<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n          <sc-for list=\"{{ packages }}\" as=\"pk\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #E0D5BE;border-radius:16px;padding:22px 18px;text-align:center;position:relative;\">\n              <sc-if value=\"{{ pk.tag }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#BF5A2B;color:#fff;font-size:11px;font-weight:600;padding:3px 11px;border-radius:20px;white-space:nowrap;\">{{ pk.tag }}<\u002Fspan><\u002Fsc-if>\n              <div style=\"width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#F0CE73,#C99A3F);display:flex;align-items:center;justify-content:center;color:#6b4e10;font-weight:700;font-size:20px;margin:6px auto 12px;\">฿<\u002Fdiv>\n              <div style=\"font-family:'Trirong',serif;font-size:30px;font-weight:700;color:#2A241C;\">{{ pk.total }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#8a7f68;margin:2px 0 14px;\">เหรียญ<\u002Fdiv>\n              <button onclick=\"{{ pk.onClick }}\" style=\"width:100%;background:#2A241C;color:#FBF6EC;border:none;border-radius:10px;padding:11px;font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:14px;cursor:pointer;\">เติม ฿{{ pk.price }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <h2 style=\"font-family:'Trirong',serif;font-size:24px;font-weight:600;margin:34px 0 16px;\">ประวัติธุรกรรม<\u002Fh2>\n        <div style=\"background:#fff;border:1px solid #E0D5BE;border-radius:16px;overflow:hidden;\">\n          <sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid #F0EBDE;\">\n              <span style=\"width:38px;height:38px;border-radius:10px;background:#F3F0E6;display:flex;align-items:center;justify-content:center;color:#7a6f58;flex-shrink:0;font-size:16px;\">{{ h.icon }}<\u002Fspan>\n              <div style=\"flex:1;\"><div style=\"font-weight:500;font-size:14.5px;color:#2A241C;\">{{ h.label }}<\u002Fdiv><div style=\"font-size:12.5px;color:#9a8f78;\">{{ h.date }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:right;\"><div style=\"font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:15.5px;color:#2A241C;\">{{ h.amt }}<\u002Fdiv><div style=\"font-size:12px;color:#9a8f78;\">คงเหลือ {{ h.bal }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== SHELF ===================== -->\n    <sc-if value=\"{{ isShelf }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:1100px;margin:0 auto;padding:22px;animation:r24in .4s ease;\">\n        <h1 style=\"font-family:'Trirong',serif;font-size:34px;font-weight:600;margin:6px 0 4px;\">ชั้นหนังสือของฉัน<\u002Fh1>\n        <p style=\"color:#8a7f68;margin:0 0 28px;\">{{ ownedCount }} เล่มที่เป็นเจ้าของ · {{ rentedCount }} เล่มที่กำลังเช่า<\u002Fp>\n\n        <!-- rented -->\n        <sc-if value=\"{{ hasRented }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;\">\n            <span style=\"width:8px;height:8px;border-radius:50%;background:#BF5A2B;\"><\u002Fspan>\n            <h2 style=\"font-family:'Trirong',serif;font-size:22px;font-weight:600;margin:0;white-space:nowrap;\">กำลังเช่า<\u002Fh2>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:38px;\">\n            <sc-for list=\"{{ rented }}\" as=\"rt\" hint-placeholder-count=\"1\">\n              <div style=\"display:flex;gap:16px;background:#fff;border:1px solid #EAC9B3;border-radius:14px;padding:16px;\">\n                <div style=\"width:80px;flex-shrink:0;aspect-ratio:2/3;border-radius:6px;overflow:hidden;box-shadow:0 4px 12px -4px rgba(0,0,0,.4);\">{{ rt.coverEl }}<\u002Fdiv>\n                <div style=\"flex:1;display:flex;flex-direction:column;\">\n                  <div style=\"font-family:'Trirong',serif;font-size:18px;font-weight:600;line-height:1.2;\">{{ rt.title }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#8a7f68;margin:2px 0 10px;\">{{ rt.author }}<\u002Fdiv>\n                  <div style=\"display:inline-flex;align-items:center;gap:6px;background:#FBEFE3;color:#BF5A2B;font-size:12.5px;font-weight:600;padding:4px 10px;border-radius:20px;align-self:flex-start;white-space:nowrap;\">⏳ เหลือ {{ rt.daysLeft }} วัน<\u002Fdiv>\n                  <div style=\"height:5px;background:#F0EBDE;border-radius:5px;margin:10px 0 12px;overflow:hidden;\"><div style=\"height:100%;width:{{ rt.pct }}%;background:#BF5A2B;border-radius:5px;\"><\u002Fdiv><\u002Fdiv>\n                  <button onclick=\"{{ rt.onRead }}\" style=\"margin-top:auto;align-self:flex-start;background:#BF5A2B;color:#FBF6EC;border:none;border-radius:9px;padding:9px 18px;font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:13.5px;cursor:pointer;\">อ่านต่อ<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- owned -->\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:#2F5D50;\"><\u002Fspan>\n          <h2 style=\"font-family:'Trirong',serif;font-size:22px;font-weight:600;margin:0;white-space:nowrap;\">เป็นเจ้าของ<\u002Fh2>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasOwned }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:22px;margin-bottom:38px;\">\n            <sc-for list=\"{{ owned }}\" as=\"ob\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ ob.onRead }}\" style=\"background:none;border:none;padding:0;cursor:pointer;text-align:left;\">\n                <div style=\"aspect-ratio:2/3;border-radius:6px;overflow:hidden;box-shadow:0 2px 4px rgba(42,36,28,.1),0 12px 22px -14px rgba(42,36,28,.4);position:relative;\">\n                  {{ ob.coverEl }}\n                  <span style=\"position:absolute;top:8px;left:8px;background:rgba(47,93,80,.92);color:#F3E9D2;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;\">เป็นเจ้าของ<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-family:'Trirong',serif;font-size:15px;font-weight:600;margin-top:9px;line-height:1.2;\">{{ ob.title }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#3B7A57;font-weight:600;margin-top:3px;\">▸ เปิดอ่าน<\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- expired -->\n        <sc-if value=\"{{ hasExpired }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;\">\n            <span style=\"width:8px;height:8px;border-radius:50%;background:#b0a48a;\"><\u002Fspan>\n            <h2 style=\"font-family:'Trirong',serif;font-size:22px;font-weight:600;margin:0;color:#8a7f68;\">หมดอายุการเช่า<\u002Fh2>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;\">\n            <sc-for list=\"{{ expired }}\" as=\"ex\" hint-placeholder-count=\"1\">\n              <div style=\"display:flex;gap:16px;background:#F5F1E7;border:1px solid #E0D5BE;border-radius:14px;padding:16px;\">\n                <div style=\"width:70px;flex-shrink:0;aspect-ratio:2/3;border-radius:6px;overflow:hidden;filter:grayscale(.5) opacity(.7);\">{{ ex.coverEl }}<\u002Fdiv>\n                <div style=\"flex:1;\">\n                  <div style=\"font-family:'Trirong',serif;font-size:17px;font-weight:600;color:#6B6253;\">{{ ex.title }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#9a8f78;margin:2px 0 12px;\">การเช่าสิ้นสุดแล้ว<\u002Fdiv>\n                  <button onclick=\"{{ ex.onRebuy }}\" style=\"background:#2A241C;color:#FBF6EC;border:none;border-radius:9px;padding:9px 16px;font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:13px;cursor:pointer;\">เช่าอีกครั้ง / ซื้อ<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== READER ===================== -->\n    <sc-if value=\"{{ isReader }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"min-height:100vh;background:#F4EFE3;display:flex;flex-direction:column;animation:r24in .3s ease;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid #E0D5BE;background:#FBF6EC;position:sticky;top:42px;z-index:10;\">\n          <button onclick=\"{{ exitReader }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:none;border:none;color:#5a5142;font-size:14px;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>ปิด<\u002Fbutton>\n          <div style=\"font-family:'Trirong',serif;font-size:16px;font-weight:600;\">{{ reader.title }}<\u002Fdiv>\n          <div style=\"display:flex;gap:14px;color:#8a7f68;\">\n            <span title=\"ขนาดตัวอักษร\" style=\"font-size:14px;cursor:pointer;\">Aa<\u002Fspan>\n            <span title=\"สารบัญ\" style=\"cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 6h16M4 12h16M4 18h10\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:230px 1fr;flex:1;\">\n          <aside style=\"border-right:1px solid #E0D5BE;padding:24px 18px;background:#FBF6EC;\">\n            <div style=\"font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#9a8f78;font-weight:600;margin-bottom:14px;\">สารบัญ<\u002Fdiv>\n            <sc-for list=\"{{ chapters }}\" as=\"ch\" hint-placeholder-count=\"6\">\n              <div style=\"padding:9px 12px;border-radius:8px;font-size:14px;color:#5a5142;margin-bottom:3px;cursor:pointer;\">{{ ch }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Faside>\n          <div style=\"padding:50px 20px;\">\n            <div style=\"max-width:620px;margin:0 auto;\">\n              <div style=\"font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:#BF5A2B;font-weight:600;margin-bottom:8px;\">บทที่ 2<\u002Fdiv>\n              <h2 style=\"font-family:'Trirong',serif;font-size:30px;font-weight:600;margin:0 0 28px;\">เสียงจากอดีต<\u002Fh2>\n              <p style=\"font-family:'Trirong',serif;font-size:19px;line-height:1.95;color:#33302a;margin:0 0 22px;\">สายฝนยังคงโปรยปรายลงมาไม่ขาดสาย เธอยืนอยู่ริมหน้าต่างบานเก่า มองออกไปยังถนนที่ว่างเปล่า ความเงียบในห้องดังกึกก้องกว่าเสียงฝนข้างนอกเสียอีก ทุกหยดที่กระทบกระจกพาเธอย้อนกลับไปยังค่ำคืนหนึ่งที่เธอพยายามจะลืม<\u002Fp>\n              <p style=\"font-family:'Trirong',serif;font-size:19px;line-height:1.95;color:#33302a;margin:0 0 22px;\">“บางครั้งสิ่งที่เราเก็บไว้นานที่สุด ก็คือสิ่งที่เราควรปล่อยไปก่อนใคร” เสียงของคุณยายยังคงดังอยู่ในความทรงจำ ชัดเจนราวกับเพิ่งพูดจบเมื่อครู่ เธอหลับตาลงช้า ๆ แล้วปล่อยให้ลมหายใจพาความหนักอึ้งในอกค่อย ๆ คลายออก<\u002Fp>\n              <p style=\"font-family:'Trirong',serif;font-size:19px;line-height:1.95;color:#33302a;margin:0 0 22px;\">นาฬิกาบนผนังเดินไปเรื่อย ๆ ไม่สนใจว่าใครจะพร้อมหรือไม่ และบางที นั่นอาจเป็นบทเรียนที่อ่อนโยนที่สุดที่เวลาเคยมอบให้<\u002Fp>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid #E0D5BE;\">\n                <button style=\"background:#fff;border:1px solid #DDD1B8;border-radius:10px;padding:11px 20px;font-family:'IBM Plex Sans Thai',sans-serif;font-size:14px;cursor:pointer;color:#5a5142;\">← บทก่อนหน้า<\u002Fbutton>\n                <span style=\"font-size:13px;color:#9a8f78;\">หน้า 34 / {{ reader.pages }}<\u002Fspan>\n                <button style=\"background:#2A241C;color:#FBF6EC;border:none;border-radius:10px;padding:11px 20px;font-family:'IBM Plex Sans Thai',sans-serif;font-size:14px;cursor:pointer;\">บทถัดไป →<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== BACK OFFICE · ADMIN SHELL ===================== -->\n    <sc-if value=\"{{ isBackoffice }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;min-height:calc(100vh - 42px);background:#EEECE4;animation:r24in .35s ease;\" data-screen-label=\"หลังบ้าน-admin\">\n        <!-- SIDEBAR -->\n        <aside style=\"width:248px;flex-shrink:0;background:#1E3329;color:#cfe0d6;display:flex;flex-direction:column;position:sticky;top:42px;height:calc(100vh - 42px);\">\n          <div style=\"padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08);\">\n            <div style=\"display:flex;align-items:center;gap:9px;\">\n              <div style=\"width:32px;height:32px;border-radius:8px;background:#2F6E54;display:flex;align-items:center;justify-content:center;font-family:'Trirong',serif;font-weight:700;color:#EDF4EF;font-size:17px;\">R<\u002Fdiv>\n              <div><div style=\"font-family:'Trirong',ser  boRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n                  <div style=\"display:grid;grid-template-columns:minmax(0,1fr) 104px 78px 64px 96px 120px;gap:12px;padding:13px 22px;align-items:center;border-bottom:1px solid #F6F2E8;\">\n                    <div style=\"display:flex;align-items:center;gap:12px;min-width:0;\">\n                      <div style=\"width:32px;flex-shrink:0;aspect-ratio:2/3;border-radius:3px;overflow:hidden;\">{{ r.coverEl }}<\u002Fdiv>\n                      <div style=\"min-width:0;\"><div style=\"font-family:'Trirong',serif;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ r.title }}<\u002Fdiv><div style=\"font-size:11.5px;color:#9a8f78;\">฿{{ r.buyPrice }} · เช่า ฿{{ r.rentPrice }}<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                    <span><span style=\"display:inline-block;font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:20px;background:{{ r.statusBg }};color:{{ r.statusFg }};white-space:nowrap;\">{{ r.status }}<\u002Fspan><\u002Fspan>\n                    <span style=\"text-align:right;font-weight:600;font-size:13.5px;\">{{ r.sales }}<\u002Fspan>\n                    <span style=\"text-align:right;font-weight:600;font-size:13.5px;color:#BF5A2B;\">{{ r.rentals }}<\u002Fspan>\n                    <span style=\"text-align:right;font-weight:600;font-size:13.5px;color:#2F6E54;\">฿{{ r.revenue }}<\u002Fspan>\n                    <span style=\"text-align:right;display:flex;gap:6px;justify-content:flex-end;\"><span style=\"font-size:12.5px;color:#5a5142;border:1px solid #DDD1B8;border-radius:7px;padding:5px 10px;cursor:pointer;\">แก้ไข<\u002Fspan><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ADD BOOK -->\n            <sc-if value=\"{{ boAdd }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"d ong',serif;font-size:17px;font-weight:600;margin:0 0 4px;\">ส่วนแบ่งรายได้<\u002Fh3>\n                  <p style=\"font-size:12px;color:#8a7f68;margin:0 0 16px;\">ต่อการขาย 1 เล่ม<\u002Fp>\n                  <div style=\"background:#F1F4F1;border-radius:12px;padding:16px;margin-bottom:16px;\">\n                    <div style=\"display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:8px;\"><span style=\"color:#5a5142;\">ราคาขาย<\u002Fspan><span style=\"font-weight:600;\">฿{{ boPrice }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:8px;\"><span style=\"color:#5a5142;\">ค่าธรรมเนียม (~3%)<\u002Fspan><span style=\"color:#a08a6a;\">−฿{{ boSplit.fee }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:8px;\"><span style=\"color:#5a5142;\">Read24 (30%)<\u002Fspan><span style=\"color:#a08a6a;\">−฿{{ boSplit.plat }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"border-top:1px dashed #C9D6CC;margin-top:9px;padding-top:10px;display:flex;justify-content:space-between;align-items:baseline;\"><span style=\"font-weight:600;color:#2F6E54;\">คุณได้รับ (70%)<\u002Fspan><span style=\"font-family:'Trirong',serif;font-size:23px;font-weight:700;color:#2F6E54;\">฿{{ boSplit.pub }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ toggleBoPub }}\" style=\"width:100%;background:#2F6E54;color:#EDF4EF;border:none;border-radius:11px;padding:13px;font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:15px;cursor:pointer;margin-bottom:10px;\">ส่งให้แอดมินอนุมัติ<\u002Fbutton>\n                  <button style=\"width:100%;background:#fff;color:#5a5142;border:1.5px solid #DDD1B8;border-radius:11px;padding:12px;font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:14px;cursor:pointer;\">บันทึกฉบับร่าง<\u002Fbutton>\n                < -radius:10px;\"><\u002Fspan><span style=\"height:14px;width:38px;background:#E8E1D0;border-radius:10px;\"><\u002Fspan><span style=\"height:14px;width:42px;background:#E8E1D0;border-radius:10px;\"><\u002Fspan><\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;\"><span style=\"aspect-ratio:2/3;background:#D8CDB4;border-radius:4px;\"><\u002Fspan><span style=\"aspect-ratio:2/3;background:#C2807C;border-radius:4px;\"><\u002Fspan><span style=\"aspect-ratio:2/3;background:#5B6E86;border-radius:4px;\"><\u002Fspan><span style=\"aspect-ratio:2/3;background:#D9A441;border-radius:4px;\"><\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#FBF8F0;border-radius:16px;padding:20px;\">\n                <div style=\"font-size:12px;font-weight:600;color:#2F5D50;margin-bottom:14px;\">เลย์เอาต์ 2 · Editorial rows by category<\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #EDE6D5;border-radius:10px;padding:14px;\">\n                  <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><div style=\"width:40%;aspect-ratio:3/2;background:#BF5A2B;border-radius:6px;\"><\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:6px;\"><span style=\"height:12px;width:80%;background:#2A241C;border-radius:8px;\"><\u002Fspan><span style=\"height:10px;width:55%;background:#E0D5BE;border-radius:8px;\"><\u002Fspan><\u002Fdiv><\u002Fdiv>\n                  <div style=\"height:9px;width:30%;background:#2F5D50;border-radius:8px;margin-bottom:8px;\"><\u002Fdiv>\n                  <div style=\"display:flex;gap:8px;overflow:hidden;\"><span style=\"width:46px;aspect-ratio:2/3;background:#5A3A52;border-radius:4px;\"><\u002Fspan><span style=\"width:46px;aspect-ratio:2/3;background:#6E7141;border-radius:4px;\"><\u002Fspan><span style=\"width:46px;aspect-ratio:2/3;background:#2C3E63;border-radius:4px;\"><\u002Fspan><span style=\"width:46px;aspect-ratio:2/3;background:#E2D2AE;border-radius:4px;\"><\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- C: FLOWS -->\n          <div>\n            <h2 style=\"font-family:'Trirong',serif;font-size:23px;font-weight:600;margin:0 0 4px;\">C · Flow ซื้อ vs เช่า<\u002Fh2>\n            <p style=\"color:#8a7f68;font-size:14px;margin:0 0 20px;\">วิธีให้ผู้ใช้เลือกระหว่างซื้อขาดกับเช่า<\u002Fp>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;\">\n              <div style=\"background:#FBF8F0;border-radius:16px;padding:20px;\">\n                <div style=\"font-size:12px;font-weight:600;color:#BF5A2B;margin-bottom:14px;\">Flow 1 · การ์ดเลือก 2 ทาง (ปัจจุบัน)<\u002Fdiv>\n                <div style=\"display:flex;gap:10px;\">\n                  <div style=\"flex:1;background:#2A241C;border-radius:11px;padding:14px;color:#fff;\"><div style=\"font-size:11px;color:#C99A3F;\">ซื้อขาด<\u002Fdiv><div style=\"font-family:'Trirong',serif;font-size:22px;font-weight:700;\">฿229<\u002Fdiv><div style=\"font-size:10.5px;color:#b9ad95;margin-top:4px;\">ถาวร<\u002Fdiv><\u002Fdiv>\n                  <div style=\"flex:1;background:#FBEFE3;border:2px solid #BF5A2B;border-radius:11px;padding:14px;\"><div style=\"font-size:11px;color:#BF5A2B;font-weight:600;\">เช่า 7 วัน<\u002Fdiv><div style=\"font-family:'Trirong',serif;font-size:22px;font-weight:700;color:#BF5A2B;\">฿69<\u002Fdiv><div style=\"font-size:10.5px;color:#9a7a5a;margin-top:4px;\">ประหยัด 70%<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#FBF8F0;border-radius:16px;padding:20px;\">\n                <div style=\"font-size:12px;font-weight:600;color:#BF5A2B;margin-bottom:14px;\">Flow 2 · ปุ่มแยก → modal ชำระเงิน<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:9px;\">\n                  <span style=\"background:#2A241C;color:#FBF6EC;border-radius:9px;padding:11px;text-align:center;font-size:13.5px;font-weight:600;\">ซื้อเลย ฿229<\u002Fspan>\n                  <span style=\"background:#fff;border:1.5px solid #BF5A2B;color:#BF5A2B;border-radius:9px;padding:11px;text-align:center;font-size:13.5px;font-weight:600;\">เช่า 7 วัน ฿69<\u002Fspan>\n                  <span style=\"text-align:center;font-size:11.5px;color:#9a8f78;margin-top:2px;\">กดแล้วเปิด modal เลือกวิธีจ่าย<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#FBF8F0;border-radius:16px;padding:20px;\">\n                <div style=\"font-size:12px;font-weight:600;color:#BF5A2B;margin-bottom:14px;\">Flow 3 · Rent-first + อัปเกรด<\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #EDE6D5;border-radius:11px;padding:14px;\">\n                  <span style=\"display:block;background:#BF5A2B;color:#fff;border-radius:9px;padding:12px;text-align:center;font-size:14px;font-weight:700;\">เริ่มเช่าอ่าน ฿69<\u002Fspan>\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-top:11px;background:#F3F0E6;border-radius:9px;padding:10px;font-size:12px;color:#2F5D50;\">↻ อ่านแล้วชอบ? อัปเกรดเป็นซื้อ <b style=\"margin-left:auto;\">+฿160<\u002Fb><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n\n  <!-- toast -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:80;background:#2A241C;color:#FBF6EC;border-radius:12px;padding:13px 20px;font-size:14.5px;font-weight:500;box-shadow:0 14px 34px rgba(42,36,28,.4);display:flex;align-items:center;gap:10px;animation:r24toast .3s ease;\">\n      <span style=\"width:20px;height:20px;border-radius:50%;background:#3B7A57;display:flex;align-items:center;justify-content:center;\">\n        <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>\n      {{ toast }}\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const P = {\n      cream:{bg:'#EFE6D2',fg:'#2A241C',accent:'#BF5A2B',motif:'rule'},\n      terra:{bg:'#BF5A2B',fg:'#FBF1E2',accent:'#2A241C',motif:'arch'},\n      forest:{bg:'#2F5D50',fg:'#F3E9D2',accent:'#C99A3F',motif:'frame'},\n      ink:{bg:'#25303A',fg:'#EBDFC4',accent:'#C99A3F',motif:'dot'},\n      mustard:{bg:'#D9A441',fg:'#3A2A12',accent:'#7A3B1A',motif:'arch'},\n      rose:{bg:'#C2807C',fg:'#3A1E1C',accent:'#6E2B26',motif:'rule'},\n      slate:{bg:'#5B6E86',fg:'#EAE3D2',accent:'#E0B45C',motif:'frame'},\n      olive:{bg:'#6E7141',fg:'#F2ECD6',accent:'#2A241C',motif:'stack'},\n      plum:{bg:'#5A3A52',fg:'#EFD9E0',accent:'#D9A441',motif:'dot'},\n      sky:{bg:'#7FA6A0',fg:'#1F2E2A',accent:'#B5491F',motif:'arch'},\n      sand:{bg:'#E2D2AE',fg:'#3A2A12',accent:'#2F5D50',motif:'stack'},\n      navy:{bg:'#2C3E63',fg:'#E8DFC6',accent:'#E0B45C',motif:'rule'},\n    };\n    const raw = [\n      {id:'b1', title:'เงาในสายฝน', author:'ปวริศา ก้องไกล', category:'นิยาย', buyPrice:229, rentPrice:69, p:'cream'},\n      {id:'b2', title:'บันทึกของคนเดินทาง', author:'ธนกร วิเศษสุข', category:'สารคดี', buyPrice:259, rentPrice:79, p:'terra'},\n      {id:'b3', title:'ดวงดาวที่หายไป', author:'มนัสนันท์ ศรีอุดม', category:'ไซไฟ', buyPrice:299, rentPrice:89, p:'navy'},\n      {id:'b4', title:'ครัวของแม่', author:'พิมพ์ชนก ใจดี', category:'อาหาร', buyPrice:189, rentPrice:55, p:'mustard'},\n      {id:'b5', title:'เมืองที่ไม่มีเวลา', author:'กฤษฎา รุ่งเรือง', category:'นิยาย', buyPrice:249, rentPrice:75, p:'forest'},\n      {id:'b6', title:'ปรัชญาในถ้วยกาแฟ', author:'สุทธิพงษ์ อินทร์', category:'พัฒนาตนเอง', buyPrice:199, rentPrice:59, p:'sand'},\n      {id:'b7', title:'ทะเลในความทรงจำ', author:'อรไพลิน ทองสุข', category:'เรื่องสั้น', buyPrice:179, rentPrice:49, p:'sky'},\n      {id:'b8', title:'รหัสลับแห่งสยาม', author:'ชัยวัฒน์ ดำรง', category:'สืบสวน', buyPrice:319, rentPrice:99, p:'ink'},\n      {id:'b9', title:'สวนหลังบ้าน', author:'นภัสสร พงษ์พันธุ์', category:'ไลฟ์สไตล์', buyPrice:209, rentPrice:65, p:'olive'},\n      {id:'b10', title:'เสียงกระซิบของป่า', author:'ธีรเดช มั่นคง', category:'นิยาย', buyPrice:269, rentPrice:79, p:'rose'},\n      {id:'b11', title:'เศรษฐกิจฉบับเข้าใจง่าย', author:'วีระพล ทรัพย์ดี', category:'ธุรกิจ', buyPrice:289, rentPrice:85, p:'slate'},\n      {id:'b12', title:'จดหมายถึงอนาคต', author:'ลลิตา แสงทอง', category:'เรื่องสั้น', buyPrice:199, rentPrice:59, p:'plum'},\n    ];\n    this.catalog = raw.map(b=>{\n      const obj = Object.assign({}, b, {cover:P[b.p], rentDays:7, pages:248});\n      obj.coverEl = this.cover(obj);\n      return obj;\n    });\n    this.state = {\n      screen:'store',\n      query:'',\n      category:'ทั้งหมด',\n      cart:['b3','b6'],\n      walletBalance:240,\n      selectedId:'b1',\n      detailMode:'buy',\n      payMethod:'coin',\n      owned:['b7'],\n      rented:[{id:'b5', daysLeft:4}],\n      expired:[{id:'b9'}],\n      readerId:'b7',\n      readerChapter:2,\n      toast:null,\n      checkoutDone:false,\n      boPublished:true,\n      boPrice:229,\n      boRent:69,\n      boTab:'dashboard',\n    };\n    this._toastT = null;\n  }\n\n  cover(b){\n    const h = React.createElement;\n    const c = b.cover;\n    const inner = [];\n    inner.push(h('div',{key:'sp',style:{position:'absolute',left:0,top:0,bottom:0,width:'4cqw',background:'linear-gradient(90deg,rgba(0,0,0,.24),rgba(0,0,0,0))'}}));\n    if(c.motif==='arch'){\n      inner.push(h('div',{key:'m',style:{position:'absolute',top:'-24cqw',right:'-16cqw',width:'82cqw',height:'82cqw',borderRadius:'50%',background:c.accent,opacity:.9}}));\n    } else if(c.motif==='frame'){\n      inner.push(h('div',{key:'m',style:{position:'absolute',top:'6cqw',left:'6cqw',right:'6cqw',bottom:'6cqw',border:'0.8cqw solid '+c.accent,opacity:.65}}));\n    } else if(c.motif==='dot'){\n      inner.push(h('div',{key:'m',style:{position:'absolute',bottom:'10cqw',right:'10cqw',width:'15cqw',height:'15cqw',borderRadius:'50%',background:c.accent}}));\n    } else if(c.motif==='stack'){\n      inner.push(h('div',{key:'m',style:{position:'absolute',left:'9cqw',right:'9cqw',bottom:'10cqw',display:'flex',flexDirection:'column',gap:'2.6cqw'}},\n        h('div',{key:1,style:{height:'1.7cqw',background:c.accent,width:'70%'}}),\n        h('div',{key:2,style:{height:'1.7cqw',background:c.accent,width:'52%',opacity:.7}}),\n        h('div',{key:3,style:{height:'1.7cqw',background:c.accent,width:'38%',opacity:.5}})\n      ));\n    }\n    const content = h('div',{key:'ct',style:{position:'relative',zIndex:2,display:'flex',flexDirection:'column',height:'100%',justifyContent:'space-between'}},\n      h('div',{key:'cat',style:{fontFamily:'\"IBM Plex Sans Thai\",sans-serif',fontSize:'4cqw',letterSpacing:'.16em',textTransform:'uppercase',fontWeight:600,opacity:.78}}, b.category),\n      h('div',{key:'tt'},\n        c.motif==='rule' ? h('div',{key:'r',style:{height:'0.8cqw',width:'24cqw',background:c.accent,marginBottom:'4cqw'}}) : null,\n        h('div',{key:'t',style:{fontFamily:'\"Trirong\",serif',fontSize:'13cqw',lineHeight:1.02,fontWeight:600,letterSpacing:'-.01em'}}, b.title),\n        h('div',{key:'a',style:{fontFamily:'\"IBM Plex Sans Thai\",sans-serif',fontSize:'4.4cqw',marginTop:'3.5cqw',opacity:.82}}, b.author)\n      )\n    );\n    return h('div',{style:{position:'relative',width:'100%',height:'100%',containerType:'inline-size'}},\n      h('div',{style:{position:'absolute',inset:0,background:c.bg,color:c.fg,overflow:'hidden',padding:'9cqw',display:'flex'}}, ...inner, content)\n    );\n  }\n\n  showToast(msg){\n    clearTimeout(this._toastT);\n    this.setState({toast:msg});\n    this._toastT = setTimeout(()=>this.setState({toast:null}), 2200);\n  }\n  go(s){ this.setState({screen:s}); try{window.scrollTo(0,0);}catch(e){} }\n  byId(id){ return this.catalog.find(b=>b.id===id); }\n\n  openBook(id){ this.setState({selectedId:id, detailMode:'buy', screen:'detail'}); try{window.scrollTo(0,0);}catch(e){} }\n  addToCart(id, ev){ if(ev&&ev.stopPropagation)ev.stopPropagation();\n    if(this.state.cart.includes(id)){ this.showToast('มีเล่มนี้อยู่ในตะกร้าแล้ว'); return; }\n    this.setState(s=>({cart:[...s.cart,id]})); this.showToast('เพิ่มลงตะกร้าแล้ว'); }\n  removeFromCart(id){ this.setState(s=>({cart:s.cart.filter(x=>x!==id)})); }\n\n  buyNow(id){ if(!this.state.owned.includes(id)) this.setState(s=>({owned:[...s.owned,id]}));\n    this.showToast('ซื้อสำเร็จ · เพิ่มในชั้นหนังสือแล้ว'); this.go('shelf'); }\n  rentNow(id){ const b=this.byId(id);\n    this.setState(s=>({rented:[...s.rented.filter(r=>r.id!==id), {id, daysLeft:b.rentDays}],\n      walletBalance: s.payMethod==='coin'? Math.max(0,s.walletBalance-b.rentPrice): s.walletBalance}));\n    this.showToast('เช่าสำเร็จ · อ่านได้ '+b.rentDays+' วัน'); this.go('shelf'); }\n  checkout(){ const ids=this.state.cart;\n    this.setState(s=>({owned:[...new Set([...s.owned,...ids])], cart:[], checkoutDone:true,\n      walletBalance: s.payMethod==='coin'? Math.max(0,s.walletBalance - this.cartTotal()): s.walletBalance}));\n    this.showToast('ชำระเงินสำเร็จ '+ids.length+' เล่ม'); }\n  cartTotal(){ return this.state.cart.reduce((t,id)=>t+(this.byId(id)?.buyPrice||0),0); }\n  topUp(amount){ this.setState(s=>({walletBalance:s.walletBalance+amount})); this.showToast('เติม '+amount+' เหรียญสำเร็จ'); }\n  openReader(id){ this.setState({readerId:id, screen:'reader'}); try{window.scrollTo(0,0);}catch(e){} }\n  setMode(m){ this.setState({detailMode:m}); }\n  setPay(m){ this.setState({payMethod:m}); }\n  goBO(tab){ this.setState({screen:'backoffice', boTab:tab||'dashboard'}); try{window.scrollTo(0,0);}catch(e){} }\n  setBoTab(t){ this.setState({boTab:t}); try{window.scrollTo(0,0);}catch(e){} }\n\n  view(b){\n    return Object.assign({}, b, {\n      onOpen:()=>this.openBook(b.id),\n      onAdd:(ev)=>this.addToCart(b.id, ev),\n      onRent:()=>{ this.setState({selectedId:b.id, detailMode:'rent', screen:'detail'}); try{window.scrollTo(0,0);}catch(e){} },\n    });\n  }\n\n  renderVals(){\n    const s = this.state;\n    const cats = ['ทั้งหมด','นิยาย','เรื่องสั้น','สารคดี','ไซไฟ','สืบสวน','พัฒนาตนเอง','ธุรกิจ','อาหาร','ไลฟ์สไตล์'];\n    const q = s.query.trim();\n    let list = this.catalog;\n    if(s.category!=='ทั้งหมด') list = list.filter(b=>b.category===s.category);\n    if(q) list = list.filter(b=>b.title.includes(q)||b.author.includes(q));\n    const books = list.map(b=>this.view(b));\n\n    const chipBase = 'font-family:\"IBM Plex Sans Thai\",sans-serif;font-size:14px;font-weight:600;border-radius:30px;padding:9px 16px;cursor:pointer;transition:all .15s;white-space:nowrap;';\n    const categories = cats.map(c=>({label:c, onClick:()=>this.setState({category:c}),\n      style: chipBase + (c===s.category ? 'background:#2A241C;color:#FBF6EC;border:1px solid #2A241C;' : 'background:#FBF6EC;color:#5a5142;border:1px solid #DDD1B8;')}));\n\n    const navStyle=(active,accent)=>'background:'+(active?(accent==='green'?'rgba(122,170,150,.22)':'rgba(191,90,43,.22)'):'transparent')+';color:'+(active?(accent==='green'?'#9FCBB3':'#F0A878'):'#b3a88f')+';border:none;border-radius:7px;padding:6px 11px;font-size:13px;font-weight:'+(active?'600':'500')+';cursor:pointer;white-space:nowrap;font-family:\"IBM Plex Sans Thai\",sans-serif;';\n    const frontScreens=[\n      {k:'store',label:'ร้านหนังสือ'},{k:'detail',label:'รายละเอียด'},{k:'cart',label:'ตะกร้า'},\n      {k:'wallet',label:'กระเป๋าเหรียญ'},{k:'shelf',label:'ชั้นหนังสือ'},{k:'reader',label:'Reader'},\n    ];\n    const navFront = frontScreens.map(x=>({label:x.label, onClick:()=>this.go(x.k), style:navStyle(s.screen===x.k,'terra')}));\n    const navBack = [\n      {label:'สำนักพิมพ์', onClick:()=>this.goBO('dashboard'), style:navStyle(s.screen==='backoffice','green')},\n    ];\n    const designLink = {label:'ดีไซน์', onClick:()=>this.go('explore'), style:navStyle(s.screen==='explore','terra')};\n\n    const heroIds=['b8','b2','b3'];\n    const heroBooks = heroIds.map((id,i)=>{\n      const b=this.byId(id);\n      const rot=[-9,0,9][i], z=[1,3,2][i], mx=[0,-22,-22][i], my=[16,0,16][i];\n      return {coverEl:b.coverEl, wrapStyle:'width:128px;aspect-ratio:2/3;border-radius:6px;overflow:hidden;box-shadow:0 18px 40px -14px rgba(0,0,0,.55);transform:rotate('+rot+'deg) translateY('+my+'px);margin-left:'+mx+'px;z-index:'+z+';position:relative;'};\n    });\n\n    // ---- detail ----\n    const sel = this.byId(s.selectedId) || this.catalog[0];\n    const selView = this.view(sel);\n    const related = this.catalog.filter(b=>b.id!==sel.id).slice(0,5).map(b=>this.view(b));\n    const payBase='display:flex;align-items:center;gap:11px;padding:14px 16px;border-radius:12px;cursor:pointer;font-family:\"IBM Plex Sans Thai\",sans-serif;font-size:14.5px;font-weight:500;text-align:left;width:100%;transition:all .15s;';\n    const payMethods=[\n      {k:'coin',label:'จ่ายด้วยเหรียญ',sub:'คงเหลือ '+s.walletBalance+' เหรียญ',icon:'฿'},\n      {k:'card',label:'บัตรเครดิต / เดบิต',sub:'Visa · Mastercard',icon:'▭'},\n      {k:'qr',label:'QR พร้อมเพย์',sub:'สแกนจ่ายผ่านแอปธนาคาร',icon:'⊞'},\n    ].map(p=>({...p, onClick:()=>this.setPay(p.k),\n      style: payBase + (s.payMethod===p.k?'background:#FBF1E2;border:2px solid #BF5A2B;':'background:#fff;border:2px solid #E0D5BE;'),\n      active:s.payMethod===p.k}));\n\n    const optBase='flex:1;text-align:left;cursor:pointer;border-radius:14px;padding:18px;transition:all .18s;position:relative;font-family:\"IBM Plex Sans Thai\",sans-serif;';\n    const buyCardStyle = optBase + (s.detailMode==='buy'?'background:#2A241C;border:2px solid #2A241C;':'background:#fff;border:2px solid #E0D5BE;');\n    const rentCardStyle = optBase + (s.detailMode==='rent'?'background:#FBEFE3;border:2px solid #BF5A2B;':'background:#fff;border:2px solid #E0D5BE;');\n\n    // ---- cart ----\n    const cartList = s.cart.map(id=>{const v=this.view(this.byId(id)); v.onRemove=()=>this.removeFromCart(id); return v;});\n    const cartSum = this.cartTotal();\n\n    // ---- wallet ----\n    const packages=[\n      {coins:50,price:50,bonus:0,tag:null},\n      {coins:100,price:100,bonus:0,tag:'ยอดนิยม'},\n      {coins:300,price:300,bonus:30,tag:'+30 โบนัส'},\n      {coins:500,price:500,bonus:75,tag:'คุ้มสุด'},\n    ].map(p=>({...p, total:p.coins+p.bonus, onClick:()=>this.topUp(p.coins+p.bonus),\n      highlight:p.tag==='คุ้มสุด'}));\n    const history=[\n      {label:'เติมเหรียญ · แพ็กเกจ 100',amt:'+100',date:'14 มิ.ย. 2026',bal:240,icon:'↑'},\n      {label:'เช่า · เมืองที่ไม่มีเวลา',amt:'−75',date:'13 มิ.ย. 2026',bal:140,icon:'↓'},\n      {label:'เติมเหรียญ · แพ็กเกจ 300 (+30)',amt:'+330',date:'10 มิ.ย. 2026',bal:215,icon:'↑'},\n      {label:'ซื้อ · ทะเลในความทรงจำ',amt:'−179',date:'8 มิ.ย. 2026',bal:100,icon:'↓'},\n      {label:'คืนเหรียญ · ไฟล์ผิดพลาด',amt:'+55',date:'5 มิ.ย. 2026',bal:64,icon:'↑'},\n    ];\n\n    // ---- shelf ----\n    const owned = s.owned.map(id=>{const v=this.view(this.byId(id)); v.onRead=()=>this.openReader(id); return v;});\n    const rented = s.rented.map(r=>{const v=this.view(this.byId(r.id)); v.daysLeft=r.daysLeft; v.onRead=()=>this.openReader(r.id); v.pct=Math.round(r.daysLeft/this.byId(r.id).rentDays*100); return v;});\n    const expired = s.expired.map(r=>{const v=this.view(this.byId(r.id)); v.onRebuy=()=>this.openBook(r.id); return v;});\n\n    // ---- reader ----\n    const reader = this.byId(s.readerId) || this.catalog[0];\n    const chapters=['บทนำ','1 · เช้าวันที่ฝนตก','2 · เสียงจากอดีต','3 · ทางแยก','4 · กลับบ้าน','บทส่งท้าย'];\n\n    // ---- backoffice (admin shell) ----\n    const fee=Math.round(s.boPrice*0.03);\n    const net=s.boPrice-fee;\n    const boSplit={fee, net, pub:Math.round(net*0.7), plat:Math.round(net*0.3)};\n    const statusMap={'เผยแพร่':{bg:'#E0EFE7',fg:'#2F6E54'},'รออนุมัติ':{bg:'#FBEFD6',fg:'#8a6a16'},'ฉบับร่าง':{bg:'#ECEAE2',fg:'#7a7263'},'ระงับ':{bg:'#F6E0DA',fg:'#9a4632'}};\n    const boRows=this.catalog.slice(0,6).map((b,i)=>{\n      const st=['เผยแพร่','เผยแพร่','รออนุมัติ','เผยแพร่','ฉบับร่าง','เผยแพร่'][i];\n      return {...b, status:st, statusBg:statusMap[st].bg, statusFg:statusMap[st].fg,\n        sales:[128,86,0,212,0,64][i], rentals:[42,31,0,88,0,19][i], revenue:[20633,15694,0,29984,0,9213][i]};\n    });\n    const chartRaw=[{m:'ม.ค.',v:38},{m:'ก.พ.',v:52},{m:'มี.ค.',v:46},{m:'เม.ย.',v:61},{m:'พ.ค.',v:55},{m:'มิ.ย.',v:72}];\n    const chartMax=Math.max(...chartRaw.map(c=>c.v));\n    const chartBars=chartRaw.map(c=>({...c, h:Math.round(c.v/chartMax*100)}));\n    const boStats=[\n      {label:'ยอดขายเดือนนี้',value:'฿66,311',sub:'▲ 18% จากเดือนก่อน',accent:'#2A241C'},\n      {label:'ส่วนแบ่งของคุณ',value:'฿46,418',sub:'70% หลังหักค่าธรรมเนียม',accent:'#2F6E54'},\n      {label:'เล่มที่เผยแพร่',value:'4',sub:'จากทั้งหมด 6 เล่ม',accent:'#2A241C'},\n      {label:'ยอดเช่ารวม',value:'180',sub:'ครั้งในเดือนนี้',accent:'#BF5A2B'},\n    ];\n    const boRecent=[\n      {icon:'฿',label:'ขาย · รหัสลับแห่งสยาม',amt:'+฿319',date:'วันนี้ 14:22'},\n      {icon:'⏳',label:'เช่า · เงาในสายฝน',amt:'+฿69',date:'วันนี้ 11:05'},\n      {icon:'฿',label:'ขาย · ดวงดาวที่หายไป',amt:'+฿299',date:'เมื่อวาน 19:40'},\n      {icon:'↑',label:'เผยแพร่ · ครัวของแม่',amt:'',date:'12 มิ.ย.'},\n    ];\n    const boQueue=['b3','b6','b12'].map((id,i)=>{const b=this.byId(id); return {...b,\n      publisher:['สำนักพิมพ์ใบลาน','สนพ. ดาวเหนือ','สนพ. ริมทะเล'][i],\n      submitted:['13 มิ.ย. 2026','12 มิ.ย. 2026','11 มิ.ย. 2026'][i],\n      onApprove:()=>this.showToast('เผยแพร่ “'+b.title+'” แล้ว'),\n      onReject:()=>this.showToast('ส่งกลับแก้ไข “'+b.title+'”')};});\n    const boRevRows=[\n      {label:'ซื้อขาด',orders:426,gross:'฿98,540',share:'฿66,938'},\n      {label:'เช่าอ่าน',orders:180,gross:'฿13,420',share:'฿9,115'},\n    ];\n    const boNav=[\n      {k:'dashboard',label:'แดชบอร์ด',icon:'▦',admin:false},\n      {k:'books',label:'หนังสือของฉัน',icon:'❑',admin:false},\n      {k:'add',label:'เพิ่มหนังสือใหม่',icon:'＋',admin:false},\n      {k:'revenue',label:'รายได้ & ส่วนแบ่ง',icon:'฿',admin:false},\n      {k:'approval',label:'คิวอนุมัติ',icon:'✓',admin:true},\n    ].map(x=>({...x, onClick:()=>this.setBoTab(x.k), active:s.boTab===x.k,\n      style:'display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;cursor:pointer;border-radius:9px;padding:11px 13px;font-size:14px;font-family:\"IBM Plex Sans Thai\",sans-serif;font-weight:'+(s.boTab===x.k?'600':'500')+';'+(s.boTab===x.k?'background:rgba(159,203,179,.20);color:#EDF4EF;':'background:transparent;color:#93a99e;')}));\n    const boTitle={dashboard:'แดชบอร์ด',books:'หนังสือของฉัน',add:'เพิ่มหนังสือใหม่',revenue:'รายได้ & ส่วนแบ่ง',approval:'คิวอนุมัติหนังสือ'}[s.boTab];\n\n    return {\n      navFront, navBack, designLink,\n      showChrome: ['store','detail','cart','wallet','shelf'].includes(s.screen),\n      isStore: s.screen==='store',\n      query:s.query, onQuery:(e)=>this.setState({query:e.target.value}),\n      walletBalance:s.walletBalance, cartCount:s.cart.length || null,\n      goStore:()=>this.go('store'), goWallet:()=>this.go('wallet'), goShelf:()=>this.go('shelf'), goCart:()=>this.go('cart'),\n      scrollGrid:()=>{ try{document.getElementById('r24grid')?.scrollIntoView?.({behavior:'smooth'});}catch(e){} },\n      categories, books,\n      heroBooks,\n      catTitle: s.category==='ทั้งหมด'?'หนังสือทั้งหมด':s.category,\n      resultCount: books.length, hasResults: books.length>0, noResults: books.length===0,\n      toast:s.toast,\n\n      // detail\n      isDetail:s.screen==='detail', sel:selView, related,\n      modeBuy:s.detailMode==='buy', modeRent:s.detailMode==='rent',\n      buyCardStyle, rentCardStyle,\n      setBuy:()=>this.setMode('buy'), setRent:()=>this.setMode('rent'),\n      payMethods, payMethod:s.payMethod,\n      detailPrice: s.detailMode==='buy'?sel.buyPrice:sel.rentPrice,\n      doConfirm: s.detailMode==='buy'? ()=>this.buyNow(sel.id) : ()=>this.rentNow(sel.id),\n      confirmLabel: s.detailMode==='buy'? 'ยืนยันซื้อ ฿'+sel.buyPrice : 'ยืนยันเช่า ฿'+sel.rentPrice,\n      addSel:()=>this.addToCart(sel.id),\n\n      // cart\n      isCart:s.screen==='cart', cartList, cartSum, cartEmpty:s.cart.length===0,\n      checkoutDone:s.checkoutDone,\n      doCheckout:()=>this.checkout(),\n      resetCart:()=>{ this.setState({checkoutDone:false}); this.go('store'); },\n\n      // wallet\n      isWallet:s.screen==='wallet', packages, history,\n\n      // shelf\n      isShelf:s.screen==='shelf', owned, rented, expired,\n      ownedCount:owned.length, rentedCount:rented.length, expiredCount:expired.length,\n      hasOwned:owned.length>0, hasRented:rented.length>0, hasExpired:expired.length>0,\n\n      // reader\n      isReader:s.screen==='reader', reader, chapters, readerCover:reader.coverEl,\n      exitReader:()=>this.go('shelf'),\n\n      // backoffice (admin)\n      isBackoffice:s.screen==='backoffice', boRows, boSplit, boPrice:s.boPrice, boRent:s.boRent,\n      boPublished:s.boPublished, toggleBoPub:()=>this.setState(st=>({boPublished:!st.boPublished})),\n      setBoPrice:(e)=>this.setState({boPrice:Math.max(0,parseInt(e.target.value||'0',10))}),\n      setBoRent:(e)=>this.setState({boRent:Math.max(0,parseInt(e.target.value||'0',10))}),\n      boNav, boTitle, goStoreFromBO:()=>this.go('store'), goAddBook:()=>this.setBoTab('add'),\n      boDash:s.boTab==='dashboard', boBooks:s.boTab==='books', boAdd:s.boTab==='add',\n      boRev:s.boTab==='revenue', boApproval:s.boTab==='approval',\n      chartBars, boStats, boRecent, boQueue, boRevRows,\n\n      // explore\n      isExplore:s.screen==='explore',\n      ex1:this.view(this.byId('b1')), ex2:this.view(this.byId('b8')), ex3:this.view(this.byId('b3')),\n      ex4:this.view(this.byId('b5')), ex5:this.view(this.byId('b4')), ex6:this.view(this.byId('b10')),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
